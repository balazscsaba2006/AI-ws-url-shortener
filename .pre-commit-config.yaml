fail_fast: true
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.6.0
      hooks:
          - id: check-added-large-files
            args: ['--maxkb=2000']
          - id: check-merge-conflict
          - id: trailing-whitespace
          - id: end-of-file-fixer

    - repo: local
      hooks:
          - id: php-lint
            name: PHP Syntax Check
            language: system
            entry: php -l
            files: \.php$
            pass_filenames: true

          - id: pint
            name: Laravel Pint
            language: system
            entry: vendor/bin/pint
            files: \.php$
            pass_filenames: true

          - id: phpstan
            name: PHPStan
            language: system
            entry: vendor/bin/phpstan analyse --memory-limit=512M
            files: \.php$
            pass_filenames: false

          - id: pest
            name: Pest Tests
            language: system
            entry: vendor/bin/pest
            files: \.php$
            pass_filenames: false
